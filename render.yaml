databases:
  - name: coachxmedia-db
    plan: free
    databaseName: coachxmedia
    user: coachxmedia

services:
  - type: web
    name: coachxmedia-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: coachxmedia-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: REDIS_URL
        value: ""
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: GOOGLE_CLIENT_SECRET
        value: ""
      - key: GOOGLE_REDIRECT_URI
        value: ""
      - key: AWS_ACCESS_KEY_ID
        value: ""
      - key: AWS_SECRET_ACCESS_KEY
        value: ""
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: coachxmedia-uploads
      - key: S3_ENDPOINT_URL
        value: ""
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
      - key: STRIPE_PRICE_ID_PRO
        value: ""
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: MAX_UPLOAD_SIZE_MB
        value: "500"
